<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0F0F12"/>
      <stop offset="100%" stop-color="#08080A"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#00B8D4"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bg)"/>
  <!-- Conic-like ring (faux with rotated ellipses) -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="160" ry="160" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- 4-pointed star/sparkle in center -->
  <g transform="translate(256,256)" filter="url(#glow)">
    <path d="M 0,-80 Q 10,-10 80,0 Q 10,10 0,80 Q -10,10 -80,0 Q -10,-10 0,-80 Z"
          fill="#00E5FF"/>
  </g>
</svg>
